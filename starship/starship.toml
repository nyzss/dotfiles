[os]
style = "bg:#9A348E"
disabled = true      # Disabled by default

# Change the default prompt characters
# [character]
# success_symbol = "у°ёһ"
# error_symbol = "оҷ”"


# Shows the username
[username]
style_user = "green"
style_root = "red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](blue) "
disabled = false


[time]
disabled = true
time_format = "%R"                                      # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[directory]
truncation_length = 1
truncation_symbol = "../"
home_symbol = "пҹқ ~"
read_only_style = "197"
read_only = " пҖЈ "
format = "at [$path]($style)[$read_only]($read_only_style) "


[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пһЎ "
format = "[$symbol$branch]($style) "
# truncation_length = 4
truncation_symbol = "вҖҰ/"
style = "bold green"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "рҹҸі"
up_to_date = "пҒҶ "
untracked = "п”© "
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
stashed = "пЈ– "
modified = "пҒ„ "
staged = '[++\($count\)](green)'
renamed = "пӘ¶ "
deleted = "пҖ” "

[kubernetes]
format = 'via [пҙұ $context\($namespace\)](bold purple) '
disabled = false

# (deactivated because of no space left)
[terraform]
format = "via [п„ө terraform $version]($style) пҘӮ [$workspace]($style) "
disabled = true

[vagrant]
format = "via [п„ө vagrant $version]($style) "
disabled = true

[docker_context]
format = "via [пҢҲ $context](bold blue) "
disabled = true

[helm]
format = "via [пҲҡ $version](bold purple) "
disabled = true

[python]
symbol = "п ҹ "
python_binary = "python3"
disabled = true

[nodejs]
format = "via [пўҳ $version](bold green) "
disabled = true

[ruby]
format = "via [оҲҫ $version]($style) "
disabled = true
